name: punishment_focus_app
description: A focus timer that punishes when you lose focus.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  window_manager: ^0.3.9
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2           # for stats & settings
  file_picker: ^11.0.1                  # for custom sound
  path_provider: ^2.1.1                # for local file paths
  flutter_local_notifications: ^16.3.0 # for break reminders (optional but nice)
  csv: ^5.1.1                          # for CSV export
  flutter_acrylic: ^1.1.3              # optional: for transparent window effects

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.ico
    - assets/icon.png
    - assets/sounds/